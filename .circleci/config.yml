version: 2.1

jobs:
  build-and-test:
    docker:
      - image: cimg/openjdk:11.0
    
    steps:
      - checkout
      
      # Restore cached dependencies
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "pom.xml" }}
            - v1-dependencies-
      
      # Download dependencies (cached)
      - run:
          name: Download dependencies
          command: mvn dependency:go-offline
      
      # Save cache
      - save_cache:
          paths:
            - ~/.m2
          key: v1-dependencies-{{ checksum "pom.xml" }}
      
      # Build and package
      - run:
          name: Build and package
          command: mvn clean package
      
      # Archive the WAR file
      - run:
          name: Prepare artifacts
          command: |
            mkdir -p artifacts
            cp target/*.war artifacts/ || echo "No WAR file found"
      
      # Store artifacts
      - store_artifacts:
          path: artifacts
          destination: builds
      
      # Store test results
      - store_test_results:
          path: target/surefire-reports

workflows:
  version: 2
  build-workflow:
    jobs:
      - build-and-test