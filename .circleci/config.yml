version: 2.1

jobs:
  build:
    docker:
      - image: cimg/openjdk:11.0
    
    working_directory: ~/project
    
    steps:
      - checkout:
          path: ~/project
      
      - run:
          name: Verify files
          command: |
            pwd
            ls -la
            if [ ! -f "pom.xml" ]; then
              echo "ERROR: pom.xml missing!"
              exit 1
            fi
            echo "pom.xml found, building..."
      
      - run:
          name: Build with Maven
          command: mvn clean package
      
      - run:
          name: Verify WAR file
          command: |
            if [ -f "target/devops.war" ]; then
              echo "✓ WAR file created successfully"
              ls -la target/devops.war
            else
              echo "✗ WAR file not found"
              ls -la target/
            fi
      
      - store_artifacts:
          path: target/devops.war
          destination: devops-app.war

workflows:
  version: 2
  build:
    jobs:
      - build