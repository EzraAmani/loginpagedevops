# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/reference/configuration-reference
version: 2.1

# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/guides/orchestrate/jobs-steps/#jobs-overview & https://circleci.com/docs/reference/configuration-reference/#jobs
jobs:
  say-hello:
    # Specify the execution environment. You can specify an image from Docker Hub or use one of our convenience images from CircleCI's Developer Hub.
    # See: https://circleci.com/docs/guides/execution-managed/executor-intro/ & https://circleci.com/docs/reference/configuration-reference/#executor-job
    docker:
      # Specify the version you desire here
      # See: https://circleci.com/developer/images/image/cimg/base
      - image: cimg/base:current

    # Add steps to the job
    # See: https://circleci.com/docs/guides/orchestrate/jobs-steps/#steps-overview & https://circleci.com/docs/reference/configuration-reference/#steps
      - image: cimg/openjdk:11.0
    
    steps:
      # Checkout the code as the first step.
      - checkout
      
      # Navigate to the devops directory where pom.xml is located
      - run:
          name: Go to project directory
          command: |
            echo "Current directory: $(pwd)"
            ls -la
            echo "Looking for devops directory..."
            if [ -d "devops" ]; then
              cd devops
              echo "✓ Found devops directory, pom.xml should be here"
              ls -la
            else
              echo "✗ devops directory not found!"
              exit 1
            fi
      
      # Install dependencies
      - run:
          name: "Say hello"
          command: "echo Hello, World!"

# Orchestrate jobs using workflows
# See: https://circleci.com/docs/guides/orchestrate/workflows/ & https://circleci.com/docs/reference/configuration-reference/#workflows
          name: Install dependencies
          command: |
            cd devops
            mvn dependency:go-offline
      
      # Build the WAR file
      - run:
          name: Build WAR file
          command: |
            cd devops
            mvn clean package
            echo "✓ Build completed"
      
      # Verify WAR file and generate fingerprint
      - run:
          name: Verify WAR file and generate fingerprint
          command: |
            cd devops
            if [ -f "target/devops.war" ]; then
              echo "✓ WAR file created successfully"
              
              # Get file size
              FILESIZE=$(stat -c%s "target/devops.war")
              echo "File size: $FILESIZE bytes"
              
              # Generate MD5 fingerprint
              echo "=== MD5 Fingerprint ==="
              md5sum target/devops.war | tee target/devops.war.md5
              
              # Generate SHA256 fingerprint
              echo "=== SHA256 Fingerprint ==="
              sha256sum target/devops.war | tee target/devops.war.sha256
              
              # Show file details
              echo "=== File Details ==="
              file target/devops.war
              ls -lh target/devops.war
              
              # Create fingerprint file - using simple echo statements
              echo "BUILD_FINGERPRINT" > target/fingerprint.txt
              echo "================" >> target/fingerprint.txt
              echo "Date: $(date -u)" >> target/fingerprint.txt
              echo "Build: $CIRCLE_BUILD_NUM" >> target/fingerprint.txt
              echo "Branch: $CIRCLE_BRANCH" >> target/fingerprint.txt
              echo "Commit: $CIRCLE_SHA1" >> target/fingerprint.txt
              echo "" >> target/fingerprint.txt
              echo "WAR File: devops.war" >> target/fingerprint.txt
              echo "Size: $FILESIZE bytes" >> target/fingerprint.txt
              echo "MD5: $(md5sum target/devops.war | cut -d' ' -f1)" >> target/fingerprint.txt
              echo "SHA256: $(sha256sum target/devops.war | cut -d' ' -f1)" >> target/fingerprint.txt
              
              echo "✓ Fingerprint file created at target/fingerprint.txt"
              cat target/fingerprint.txt
            else
              echo "✗ WAR file not found!"
              ls -la target/
              exit 1
            fi
      
      # Store the WAR file and fingerprints as artifacts
      - store_artifacts:
          path: devops/target/devops.war
          destination: devops-app.war
          when: always
          
      - store_artifacts:
          path: devops/target/devops.war.md5
          destination: devops-app.war.md5
          when: always
          
      - store_artifacts:
          path: devops/target/devops.war.sha256
          destination: devops-app.war.sha256
          when: always
          
      - store_artifacts:
          path: devops/target/fingerprint.txt
          destination: build-fingerprint.txt
          when: always

workflows:
  say-hello-workflow: # This is the name of the workflow, feel free to change it to better match your workflow.
    # Inside the workflow, you define the jobs you want to run.
  version: 2
  build-and-deploy:
    jobs:
      - say-hello