version: 2.1

jobs:
  build:
    docker:
      # Use OpenJDK 11 image (matches your Java 11 setup)
      - image: cimg/openjdk:11.0
        auth:
          username: $DOCKERHUB_USERNAME
          password: $DOCKERHUB_PASSWORD  # optional, only if you need to pull private images
    
    working_directory: ~/repo

    environment:
      # Customize JVM options
      MAVEN_OPTS: -Xmx3200m
    
    steps:
      # Check out the code from GitHub
      - checkout
      
      # Restore Maven dependencies from cache (speeds up builds)
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "pom.xml" }}
            # Fall back to latest cache if no exact match
            - v1-dependencies-
      
      # Download dependencies
      - run:
          name: Download Dependencies
          command: mvn dependency:go-offline
      
      # Save dependencies to cache
      - save_cache:
          paths:
            - ~/.m2
          key: v1-dependencies-{{ checksum "pom.xml" }}
      
      # Build and test the application
      - run:
          name: Build and Test
          command: mvn clean package
      
      # Upload test results to CircleCI for display in the UI
      - store_test_results:
          path: target/surefire-reports
      
      # Store the built WAR file as an artifact
      - store_artifacts:
          path: target/devops.war
          destination: devops-app.war

workflows:
  version: 2
  build-and-test:
    jobs:
      - build