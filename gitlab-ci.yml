image: cimg/openjdk:11.0

stages:
  - build
  - publish

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  # Change these to your actual Docker Hub details
  DOCKERHUB_REPO: "your-dockerhub-username/your-repo-name"

cache:
  paths:
    - .m2/repository/

# --- BUILD STAGE ---
build_war:
  stage: build
  before_script:
    - apt-get update && apt-get install -y file coreutils
  script:
    - if [ -d "devops" ]; then
        cd devops;
        echo "✓ Found devops directory";
      else
        echo "✗ devops directory not found!";
        exit 1;
      fi
    - mvn clean package -DskipTests
    - echo "✓ Build completed"
  artifacts:
    paths:
      - devops/target/devops.war
      - devops/target/fingerprint.txt
    expire_in: 1 week

# --- PUBLISH STAGE ---
publish_docker:
  stage: publish
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    # 1. Login to Docker Hub (Requires variables in GitLab Settings -> CI/CD)
    - echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
    
    # 2. Move into the directory where the Dockerfile and WAR are
    - cd devops
    
    # 3. Build the image
    # We tag it with the commit hash for versioning and 'latest' for convenience
    - docker build -t $DOCKERHUB_REPO:$CI_COMMIT_SHORT_SHA -t $DOCKERHUB_REPO:latest .
    
    # 4. Push to Docker Hub
    - docker push $DOCKERHUB_REPO:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKERHUB_REPO:latest
    - echo "✓ Image successfully pushed to Docker Hub"
  only:
    - main  # Only push to Docker Hub when merging to main branch