image: cimg/openjdk:11.0

stages:
  - build
  - publish

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  # Replace 'devops-app' with your actual Docker Hub repository name
  DOCKERHUB_REPO: "ezra50/devops-app"

cache:
  paths:
    - .m2/repository/

before_script:
  - apt-get update && apt-get install -y file coreutils
  - echo "Current directory: $(pwd)"

build:
  stage: build
  script:
    # 1. Navigate and verify directory (Matching your original logic)
    - if [ -d "devops" ]; then
        cd devops;
        echo "✓ Found devops directory";
      else
        echo "✗ devops directory not found!";
        exit 1;
      fi
    
    # 2. Build the WAR file
    - mvn clean package -DskipTests
    - echo "✓ Build completed"
    
    # 3. Generate Fingerprint (Matching your original logic)
    - |
      if [ -f "target/devops.war" ]; then
        echo "BUILD_FINGERPRINT" > target/fingerprint.txt
        echo "================" >> target/fingerprint.txt
        echo "Date: $(date -u)" >> target/fingerprint.txt
        echo "Commit: $CI_COMMIT_SHA" >> target/fingerprint.txt
        echo "MD5: $(md5sum target/devops.war | cut -d' ' -f1)" >> target/fingerprint.txt
        cat target/fingerprint.txt
      else
        echo "✗ WAR file not found!"; exit 1;
      fi
    - cd ..
  artifacts:
    paths:
      - devops/target/devops.war
      - devops/target/fingerprint.txt
    expire_in: 30 days
    when: always

publish:
  stage: publish
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    # 1. Login using your token (Variables must be set in GitLab Settings)
    - echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
    
    # 2. Navigate to the directory containing Dockerfile and the built WAR
    - cd devops
    
    # 3. Build and Tag
    - echo "Building Docker image: $DOCKERHUB_REPO"
    - docker build -t $DOCKERHUB_REPO:$CI_COMMIT_SHORT_SHA -t $DOCKERHUB_REPO:latest .
    
    # 4. Push to Docker Hub
    - docker push $DOCKERHUB_REPO:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKERHUB_REPO:latest
    - echo "✓ Image successfully pushed to Docker Hub"
  only:
    - main